name: "PR: Dependabot auto-merge"
on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull Request number"
        required: false
        default: ""
      nx_update:
        description: "Whether to run nx migrate (true/false)"
        required: false
        default: "false"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  dependabot-check:
    name: "Dependabot Check"
    runs-on: ubuntu-latest
    outputs:
      dependency-names: ${{ steps.metadata.outputs.dependency-names }}
      update-type: ${{ steps.metadata.outputs.update-type }}
      dependency-versions: ${{ steps.metadata.outputs.new-version }}
      package-ecosystem: ${{ steps.metadata.outputs.package-ecosystem }}
      updated-dependencies-json: ${{ steps.metadata.outputs.updated-dependencies-json }}
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' && (github.event.action == 'opened' || (github.event.action == 'synchronize' && github.event.sender.login == 'dependabot[bot]')) }}
    steps:
      - name: Fetch dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3.1.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          skip-commit-verification: true

  override-cleanup:
    name: "Override cleanup"
    runs-on: ubuntu-latest
    needs: dependabot-check
    if: always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      (github.event.action == 'opened' || (github.event.action == 'synchronize' && github.event.sender.login == 'dependabot[bot]')) &&
      needs.dependabot-check.outputs.package-ecosystem == 'npm'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: "Checkout code for override cleanup"
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore NuGet packages
        run: dotnet restore nx-tinker.slnx
      - name: Derive appropriate SHAs for `nx affected`
        id: setSHAs
        uses: nrwl/nx-set-shas@v5
      - name: Install dependencies
        run: npm ci
      - name: Set user to github actions
        run: |
          git config --global user.email "dependabot[bot]@users.noreply.github.com"
          git config --global user.name "dependabot[bot]"
      - name: Reconcile npm overrides
        env:
          UPDATED_DEPS_JSON: ${{ needs.dependabot-check.outputs.updated-dependencies-json }}
          DEPENDENCY_NAMES: ${{ needs.dependabot-check.outputs.dependency-names }}
        run: |
          node scripts/reconcile-dependabot-overrides.js \
            --updated-dependencies-json "$UPDATED_DEPS_JSON" \
            --dependency-names "$DEPENDENCY_NAMES" \
            --report-path "tmp/dependabot-override-report.json"
      - name: Commit override cleanup
        run: |
          if [ ! -f tmp/dependabot-override-report.json ]; then
            echo "No override report found"
            exit 0
          fi
          node -e "const fs=require('fs'); const report=JSON.parse(fs.readFileSync('tmp/dependabot-override-report.json','utf8')); if (!report.applied) process.exit(0); const names=report.removedOverrides.map((entry) => entry.dependencyName).join(', '); const message=report.removedOverrides.length === 1 ? 'chore(deps): remove unneeded override for ' + names : 'chore(deps): remove unneeded npm overrides'; fs.writeFileSync('tmp/dependabot-override-commit-message.txt', message + '\n');"
          if [ -f tmp/dependabot-override-commit-message.txt ]; then
            git add package.json package-lock.json
            if git commit -F tmp/dependabot-override-commit-message.txt; then
              git push origin ${{ github.event.pull_request.head.ref }} --force
            else
              echo "No override cleanup changes to commit"
            fi
          fi

  nx-migrate:
    name: "NX Migrate"
    runs-on: ubuntu-latest
    needs: [dependabot-check, override-cleanup]
    if: always() &&
      (
        inputs.nx_update == 'true' ||
        (
          github.event_name == 'pull_request' &&
          (github.event.action == 'opened' || (github.event.action == 'synchronize' && github.event.sender.login == 'dependabot[bot]')) &&
          (
            contains(needs.dependabot-check.outputs.dependency-names, '@nx/') ||
            contains(needs.dependabot-check.outputs.dependency-names, 'nx')
          )
        )
      )
    steps:
      - name: "Checkout code for Dependabot automation"
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: "Run npm install"
        run: |
          npm ci
        working-directory: ${{ github.workspace }}
      - name: Set user to github actions
        run: |
          git config --global user.email "dependabot[bot]@users.noreply.github.com"
          git config --global user.name "dependabot[bot]"
      - name: "Determine nx migrate target"
        id: nx-target
        env:
          UPDATED_DEPS: ${{ needs.dependabot-check.outputs.updated-dependencies-json }}
        run: |
          node .github/get-nx-migrate-target.js
      - name: "Set package.json version to NX version (if determined)"
        if: ${{ steps.nx-target.outputs.skip != 'true' }}
        run: |
          chmod +x .github/set-package-version.sh
          .github/set-package-version.sh "${{ steps.nx-target.outputs['nx-version'] }}"
      - name: "Commit package.json version change"
        if: ${{ steps.nx-target.outputs.skip != 'true' }}
        run: |
          git add package.json
          git commit -m "chore: sync package.json version to nx@${{ steps.nx-target.outputs['nx-version'] }}" || echo "no changes to commit"
          git push origin ${{ github.event.pull_request.head.ref }} --force
      - name: "Run nx migrate and create commits"
        if: ${{ steps.nx-target.outputs.skip != 'true' }}
        run: |
          npx nx migrate ${{ steps.nx-target.outputs['migrate-target'] }}
          npx nx migrate --run-migrations --create-commits --if-exists
          if [ -f migrations.json ]; then rm -f migrations.json; fi
      - name: Running rest of commits
        run: |
          npm i
          npx nx run-many -t lint --fix
          npm i
          npm dedup
          git fetch origin main
          npm run format:write
          git add .
      - name: "Check for changes, push if there are"
        id: check-changes
        run: |
          # Fetch the main branch
          git fetch origin main
          # Check for differences between the current branch and the main branch
          if git diff --exit-code HEAD origin/main; then
            echo "No changes found"
          else
            echo "Changes found"
            git add .
            git commit -m "chore(deps): nx migrate"
            git push origin ${{ github.event.pull_request.head.ref }} --force
          fi
        continue-on-error: true

  auto-merge-and-review:
    name: "Enable Auto-Merge"
    runs-on: ubuntu-latest
    needs: [dependabot-check, nx-migrate]
    if: always() &&
      (needs.dependabot-check.outputs.update-type == 'version-update:semver-minor' || needs.dependabot-check.outputs.update-type == 'version-update:semver-patch') &&
      (needs.nx-migrate.result == 'success' || needs.nx-migrate.result == 'skipped')
    steps:
      - name: "Enable auto-merge for minor/patch updates"
        id: enable-automerge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: "Review PR with approval"
        run: |
          gh pr review "$PR_URL" --approve --body "This dependency update can be auto-merged since it's a minor or patch version update."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: "Comment on PR"
        run: |
          gh pr comment "$PR_URL" --body "This dependency update was not auto-merged as this is a major version update, please review manually."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
