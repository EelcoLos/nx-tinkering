name: Monitor overrides

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no PR creation)'
        required: false
        default: 'true'
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write
  checks: write

jobs:
  monitor:
    name: Monitor and (optionally) remove package.json overrides
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (if present)
        run: |
          if [ -f package.json ]; then
            echo "Skipping npm install during monitor (script doesn't need dependencies)."
          else
            echo "No package.json at repo root; skipping npm install"
          fi

      - name: Run override monitor script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WRITE_TOKEN: ${{ secrets.WRITE_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || github.event.inputs.dry_run || 'true' }}
        run: |
          echo "GITHUB_EVENT_NAME=$GITHUB_EVENT_NAME"
          echo "DRY_RUN=$DRY_RUN"
          if [ -f "./scripts/remove-override.js" ]; then
            node ./scripts/remove-override.js --event-path="$GITHUB_EVENT_PATH" --dry-run="$DRY_RUN"
          else
            echo "scripts/remove-override.js not found — workflow scaffolded. Add the helper script to implement behavior."
            exit 0
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-report
          path: |
            ./monitor-report.txt
            || true
