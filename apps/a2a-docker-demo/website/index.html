<!DOCTYPE html>
<html>
<head>
    <title>A2A Protocol Demo - Triage Workflow</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { color: #333; }
        .workflow { display: flex; justify-content: space-around; margin: 30px 0; }
        .service { padding: 15px; background: #e3f2fd; border-radius: 4px; text-align: center; }
        .service.active { background: #4caf50; color: white; }
        button { padding: 10px 20px; background: #2196f3; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #1976d2; }
        #result { margin-top: 20px; padding: 15px; background: #f5f5f5; border-left: 4px solid #2196f3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>A2A Protocol Demo - Triage Workflow</h1>
        <p>Agent-to-Agent communication with JWT authentication and service discovery</p>
        
        <div class="workflow">
            <div class="service">Classifier<br>5052</div>
            <div class="service">Assessor<br>5053</div>
            <div class="service">Router<br>5054</div>
            <div class="service">Handler<br>5055</div>
        </div>
        
        <button onclick="submitTriage()">Submit Triage Request</button>
        
        <div id="result"></div>
    </div>

    <script>
        async function submitTriage() {
            try {
                const response = await fetch('http://localhost:5056/api/triage', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer demo-token'
                    },
                    body: JSON.stringify({
                        issue: "Critical production outage",
                        severity: "high"
                    })
                });
                
                const data = await response.json();
                document.getElementById('result').innerHTML = 
                    '<h3>Result:</h3><pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (e) {
                document.getElementById('result').innerHTML = '<error>Error: ' + e.message + '</error>';
            }
        }
    </script>
</body>
</html>
