<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>A2A Triage Protocol Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="dashboard">
    <main class="dashboard-shell">
      <section class="dashboard" aria-labelledby="dashboardTitle">
        <div class="container">
          <header class="header">
            <div>
              <h1 id="dashboardTitle">A2A Triage Workflow</h1>
              <p class="header-subtitle">
                Demonstrating Agent-to-Agent Protocol
              </p>
            </div>
            <div class="header-actions">
              <a
                class="btn btn-observability"
                id="observabilityLink"
                href="#"
                target="_blank"
                rel="noopener noreferrer"
                >Open Observability</a
              >
              <button class="btn btn-logout" id="logoutButton" type="button">
                Logout
              </button>
            </div>
          </header>

          <div class="tabs" role="tablist" aria-label="A2A workflow views">
            <button
              class="tab active"
              id="servicesTabButton"
              type="button"
              role="tab"
              aria-selected="true"
              aria-controls="servicesTab"
              data-tab="services"
              tabindex="0"
            >
              Services
            </button>
            <button
              class="tab"
              id="triageTabButton"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="triageTab"
              data-tab="triage"
              tabindex="-1"
            >
              Submit Triage
            </button>
            <button
              class="tab"
              id="historyTabButton"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="historyTab"
              data-tab="history"
              tabindex="-1"
            >
              Request History
            </button>
          </div>

          <section
            class="tab-content active"
            id="servicesTab"
            role="tabpanel"
            aria-labelledby="servicesTabButton"
            tabindex="0"
            data-fragment="tabs/services.html"
          ></section>

          <section
            class="tab-content"
            id="triageTab"
            role="tabpanel"
            aria-labelledby="triageTabButton"
            tabindex="0"
            hidden
            data-fragment="tabs/triage.html"
          ></section>

          <section
            class="tab-content"
            id="historyTab"
            role="tabpanel"
            aria-labelledby="historyTabButton"
            tabindex="0"
            hidden
            data-fragment="tabs/history.html"
          ></section>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
