<!DOCTYPE html>
<html>
<head>
  <title>A2A Triage Demo</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
    .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
    h1 { color: #333; }
    .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 4px; }
    .login { background: #f9f9f9; }
    .input-group { margin: 10px 0; }
    input, button { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { background: #007bff; color: white; cursor: pointer; }
    button:hover { background: #0056b3; }
    .services { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .service-card { background: #f0f0f0; padding: 10px; border-radius: 4px; }
    .success { color: #28a745; }
    .error { color: #dc3545; }
    .workflow { background: #f0f8ff; padding: 15px; border-left: 4px solid #007bff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>A2A Protocol - Triage Workflow Demo</h1>
    
    <div class="section login">
      <h2>Login</h2>
      <div class="input-group">
        <label>Username (admin):</label><br>
        <input type="text" id="username" value="admin">
      </div>
      <div class="input-group">
        <label>Password (demo123):</label><br>
        <input type="password" id="password" value="demo123">
      </div>
      <button onclick="login()">Login</button>
      <div id="loginStatus"></div>
    </div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      try {
        const API_URL = 'http://localhost:5056';
        const response = await fetch(API_URL + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        if (response.ok) {
          const data = await response.json();
          document.getElementById('loginStatus').innerHTML = '<div class="success">✓ Logged in</div>';
        } else {
          document.getElementById('loginStatus').innerHTML = '<div class="error">✗ Login failed</div>';
        }
      } catch (error) {
        document.getElementById('loginStatus').innerHTML = '<div class="error">Error: ' + error.message + '</div>';
      }
    }
  </script>
</body>
</html>
