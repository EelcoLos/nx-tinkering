      - "5055:5055"
    environment:
      - ASPNETCORE_URLS=http://+:5055
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-256-bit-secret-key-must-be-min-32-chars-1234567890123}
      - IDENTITY_SERVICE_URL=http://identity:5050
      - DISCOVERY_SERVICE_URL=http://discovery:5051
      - HANDLER_SERVICE_URL=http://handler:5055
      - HANDLER_AGENT_ID=handler-agent
    networks:
      - a2a-network
    depends_on:
      identity:
        condition: service_healthy
      discovery:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5055/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  api-backend:
    build:
      context: ./api-backend
      dockerfile: Dockerfile
    image: a2a-api-backend:v2
