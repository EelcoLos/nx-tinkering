version: '3.9'

services:
  identity:
    image: a2a-identity
    ports:
      - "5050:5050"
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CLASSIFIER_AGENT_ID=${CLASSIFIER_AGENT_ID}
      - CLASSIFIER_AGENT_SECRET=${CLASSIFIER_AGENT_SECRET}
      - ASSESSOR_AGENT_ID=${ASSESSOR_AGENT_ID}
      - ASSESSOR_AGENT_SECRET=${ASSESSOR_AGENT_SECRET}
      - ROUTER_AGENT_ID=${ROUTER_AGENT_ID}
      - ROUTER_AGENT_SECRET=${ROUTER_AGENT_SECRET}
      - HANDLER_AGENT_ID=${HANDLER_AGENT_ID}
      - HANDLER_AGENT_SECRET=${HANDLER_AGENT_SECRET}
    networks:
      - a2a-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5050/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

  discovery:
    image: a2a-discovery
    ports:
      - "5051:5051"
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    networks:
      - a2a-network
    depends_on:
      identity:
        condition: service_healthy

  classifier:
    image: a2a-classifier
    ports:
      - "5052:5052"
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CLASSIFIER_AGENT_ID=${CLASSIFIER_AGENT_ID}
      - CLASSIFIER_AGENT_SECRET=${CLASSIFIER_AGENT_SECRET}
    networks:
      - a2a-network
    depends_on:
      identity:
        condition: service_healthy

  assessor:
    image: a2a-assessor
    ports:
      - "5053:5053"
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ASSESSOR_AGENT_ID=${ASSESSOR_AGENT_ID}
      - ASSESSOR_AGENT_SECRET=${ASSESSOR_AGENT_SECRET}
    networks:
      - a2a-network
    depends_on:
      identity:
        condition: service_healthy

  router:
    image: a2a-router
    ports:
      - "5054:5054"
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ROUTER_AGENT_ID=${ROUTER_AGENT_ID}
      - ROUTER_AGENT_SECRET=${ROUTER_AGENT_SECRET}
    networks:
      - a2a-network
    depends_on:
      identity:
        condition: service_healthy

  handler:
    image: a2a-handler
    ports:
      - "5055:5055"
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - HANDLER_AGENT_ID=${HANDLER_AGENT_ID}
      - HANDLER_AGENT_SECRET=${HANDLER_AGENT_SECRET}
    networks:
      - a2a-network
    depends_on:
      identity:
        condition: service_healthy

  api:
    image: a2a-api
    ports:
      - "5056:5056"
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    networks:
      - a2a-network
    depends_on:
      - identity
      - discovery
      - classifier
      - assessor
      - router
      - handler

networks:
  a2a-network:
    driver: bridge
