services:
  identity:
    build:
      context: ./identity
      dockerfile: Dockerfile
    image: a2a-identity:v2
    ports:
      - "5050:5050"
    environment:
      - ASPNETCORE_URLS=http://+:5050
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-256-bit-secret-key-must-be-min-32-chars-1234567890123}
      - IDENTITY_SERVICE_URL=http://identity:5050
      - DISCOVERY_SERVICE_URL=http://discovery:5051
    networks:
      - a2a-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5050/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  discovery:
    build:
      context: ./discovery
      dockerfile: Dockerfile
    image: a2a-discovery:v2
    ports:
      - "5051:5051"
    environment:
      - ASPNETCORE_URLS=http://+:5051
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-256-bit-secret-key-must-be-min-32-chars-1234567890123}
      - IDENTITY_SERVICE_URL=http://identity:5050
      - DISCOVERY_SERVICE_URL=http://discovery:5051
      - DISCOVERY_AGENT_ID=discovery-agent
    networks:
      - a2a-network
    depends_on:
      identity:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5051/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  classifier:
    build:
      context: ./classifier
      dockerfile: Dockerfile
    image: a2a-classifier:v2
    ports:
      - "5052:5052"
    environment:
      - ASPNETCORE_URLS=http://+:5052
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-256-bit-secret-key-must-be-min-32-chars-1234567890123}
      - IDENTITY_SERVICE_URL=http://identity:5050
      - DISCOVERY_SERVICE_URL=http://discovery:5051
      - CLASSIFIER_SERVICE_URL=http://classifier:5052
      - CLASSIFIER_AGENT_ID=classifier-agent
    networks:
      - a2a-network
    depends_on:
      identity:
        condition: service_healthy
      discovery:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5052/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  assessor:
    build:
      context: ./assessor
      dockerfile: Dockerfile
    image: a2a-assessor:v2
    ports:
      - "5053:5053"
    environment:
      - ASPNETCORE_URLS=http://+:5053
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-256-bit-secret-key-must-be-min-32-chars-1234567890123}
      - IDENTITY_SERVICE_URL=http://identity:5050
      - DISCOVERY_SERVICE_URL=http://discovery:5051
      - ASSESSOR_SERVICE_URL=http://assessor:5053
      - ASSESSOR_AGENT_ID=assessor-agent
    networks:
      - a2a-network
    depends_on:
      identity:
        condition: service_healthy
      discovery:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5053/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  router:
    build:
      context: ./router
      dockerfile: Dockerfile
    image: a2a-router:v2
    ports:
      - "5054:5054"
    environment:
      - ASPNETCORE_URLS=http://+:5054
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-256-bit-secret-key-must-be-min-32-chars-1234567890123}
      - IDENTITY_SERVICE_URL=http://identity:5050
      - DISCOVERY_SERVICE_URL=http://discovery:5051
      - ROUTER_SERVICE_URL=http://router:5054
      - ROUTER_AGENT_ID=router-agent
    networks:
      - a2a-network
    depends_on:
      identity:
        condition: service_healthy
      discovery:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5054/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  handler:
    build:
      context: ./handler
