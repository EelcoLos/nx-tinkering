version: '3.9'

services:
  identity:
    image: a2a-identity:v8-a2a
    ports:
      - "5050:5050"
    environment:
      - ASPNETCORE_URLS=http://+:5050
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - IDENTITY_SERVICE_URL=http://identity:5050
    networks:
      - a2a-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5050/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  classifier:
    image: a2a-classifier:v8-a2a
    ports:
      - "5052:5052"
    environment:
      - ASPNETCORE_URLS=http://+:5052
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - IDENTITY_SERVICE_URL=http://identity:5050
      - CLASSIFIER_SERVICE_URL=http://classifier:5052
      - CLASSIFIER_AGENT_ID=classifier-agent
    networks:
      - a2a-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5052/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  assessor:
    image: a2a-assessor:v8-a2a
    ports:
      - "5053:5053"
    environment:
      - ASPNETCORE_URLS=http://+:5053
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - IDENTITY_SERVICE_URL=http://identity:5050
      - ASSESSOR_SERVICE_URL=http://assessor:5053
      - ASSESSOR_AGENT_ID=assessor-agent
    networks:
      - a2a-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5053/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  router:
    image: a2a-router:v8-a2a
    ports:
      - "5054:5054"
    environment:
      - ASPNETCORE_URLS=http://+:5054
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - IDENTITY_SERVICE_URL=http://identity:5050
      - ROUTER_SERVICE_URL=http://router:5054
      - ROUTER_AGENT_ID=router-agent
    networks:
      - a2a-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5054/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  handler:
    image: a2a-handler:v8-a2a
    ports:
      - "5055:5055"
    environment:
      - ASPNETCORE_URLS=http://+:5055
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - IDENTITY_SERVICE_URL=http://identity:5050
      - HANDLER_SERVICE_URL=http://handler:5055
      - HANDLER_AGENT_ID=handler-agent
    networks:
      - a2a-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5055/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  api-backend:
    image: a2a-api-backend:v10-a2a
    ports:
      - "5056:5056"
    environment:
      - ASPNETCORE_URLS=http://+:5056
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - IDENTITY_SERVICE_URL=http://identity:5050
      - CLASSIFIER_SERVICE_URL=http://classifier:5052
      - ASSESSOR_SERVICE_URL=http://assessor:5053
      - ROUTER_SERVICE_URL=http://router:5054
      - HANDLER_SERVICE_URL=http://handler:5055
      - API_BACKEND_SERVICE_URL=http://api-backend:5056
      - API_BACKEND_AGENT_ID=api-backend-agent
    networks:
      - a2a-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5056/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  website:
    image: a2a-website:v16
    ports:
      - "8080:80"
    networks:
      - a2a-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  a2a-network:
    driver: bridge
