version: '3.9'

services:
  identity:
    image: a2a-identity:v2
    ports:
      - "5050:5050"
    environment:
      - ASPNETCORE_URLS=http://+:5050
      - JWT_SECRET_KEY=your-256-bit-secret-key-must-be-min-32-chars-1234567890123
    networks:
      - a2a-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5050/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  a2a-network:
    driver: overlay
    driver_opts:
      com.docker.network.driver.overlay.vxlanid: "4096"
